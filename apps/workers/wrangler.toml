# HostDaddy.app Workers — apps/workers
# Deploys to api.hostdaddy.app once the route is bound in Cloudflare dashboard.

name = "hostdaddy-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# ── Routes (set after DNS for hostdaddy.app is in CF) ─────────────────────────
# routes = [
#   { pattern = "api.hostdaddy.app/*", zone_name = "hostdaddy.app" }
# ]

# ── Environment variables (non-secret) ───────────────────────────────────────
[vars]
NODE_ENV = "production"
APP_URL = "https://hostdaddy.app"
# Where R2 media is publicly served from. Leave blank in dev to use the
# R2 dev URL fallback. In prod, point this at cdn.hostdaddy.app or similar.
MEDIA_PUBLIC_BASE_URL = ""
# Default model for the Sites AI build agent.
AI_MODEL = "claude-sonnet-4-6"

# ── D1 binding ───────────────────────────────────────────────────────────────
# Replace database_id with the value from HOSTDADDY_ACCOUNT_SETUP.md §1.5
[[d1_databases]]
binding = "DB"
database_name = "hostdaddy-prod"
database_id = "837f0b44-8d86-47c3-99e5-5274a9cd413b"
migrations_dir = "../../packages/db/drizzle"

# ── KV (sessions / cache) ────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "SESSIONS"
id = "9fd5e866de6c42ffa1d96c1f9227d191"

# ── R2 (media library for the Sites module) ──────────────────────────────────
# Create the bucket once with:
#   wrangler r2 bucket create hostdaddy-assets
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "hostdaddy-assets"

# ── Cron Triggers (Phase 6: renewal reminders) ───────────────────────────────
[triggers]
crons = [
  "0 8 * * *"   # daily 08:00 UTC — sends 60/30/14/7-day renewal reminders
]

# ── Secrets (set with `wrangler secret put NAME`) ────────────────────────────
# CLOUDFLARE_ACCOUNT_ID
# CLOUDFLARE_API_TOKEN
# JWT_SECRET
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# BILLPLZ_API_KEY
# BILLPLZ_X_SIGNATURE_KEY
# RESEND_API_KEY
# EXABYTES_API_KEY
# EXABYTES_RESELLER_ID
# ANTHROPIC_API_KEY      # Sites module: AI build agent + visitor chat
# TURNSTILE_SECRET       # Sites module: form-submission captcha
